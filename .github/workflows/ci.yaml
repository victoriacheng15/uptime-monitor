name: Continue Integration

on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "**/*.md"
      - ".markdownlint.json"
      - "infra/**/*.tf"
      - "infra/.terraform.lock.hcl"
      - "e2e/**"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "**/*.md"
      - ".markdownlint.json"
      - "infra/**/*.tf"
      - "infra/.terraform.lock.hcl"
      - "e2e/**"
  workflow_dispatch:

env:
  go-version: '1.26'
  node-version: 'lts/*'

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      markdown: ${{ steps.filter.outputs.markdown }}
      infra: ${{ steps.filter.outputs.infra }}
      bdd: ${{ steps.filter.outputs.bdd }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            markdown:
              - '**/*.md'
              - '.markdownlint.json'
            infra:
              - 'infra/**/*.tf'
              - 'infra/.terraform.lock.hcl'
            bdd:
              - 'e2e/**'

  lint:
    needs: filter
    if: ${{ needs.filter.outputs.go == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: "go.sum"

      - name: Format Check
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Vet Check
        run: go vet ./cmd/... ./internal/...

  lint-md:
    needs: filter
    if: ${{ needs.filter.outputs.markdown == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}
      - name: Lint Markdown
        run: make lint-md

  lint-infra:
    needs: filter
    if: ${{ needs.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: opentofu/setup-opentofu@v2
      - name: Check formatting
        run: tofu fmt -check -recursive infra
      - name: Init
        working-directory: infra
        run: tofu init -backend=false
      - name: Validate
        working-directory: infra
        run: tofu validate

  test:
    needs: filter
    if: ${{ needs.filter.outputs.go == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: "go.sum"

      - name: Test
        run: make test

  test-bdd:
    needs: filter
    if: ${{ needs.filter.outputs.go == 'true' || needs.filter.outputs.bdd == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: "go.sum"

      - name: Run BDD Tests
        run: make test-bdd
