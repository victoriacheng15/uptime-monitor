name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

env:
  go-version: '1.25'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: "go.sum"

      - name: Format Check
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Vet Check
        run: go vet ./cmd/... ./internal/...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: "go.sum"

      - name: Test
        run: make test
