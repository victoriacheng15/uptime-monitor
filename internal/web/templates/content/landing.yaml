header:
  project_name: "Uptime Monitor"
  site_url: "https://victoriacheng15.github.io/uptime-monitor"

system_specification:
  objective: "A cost-efficient, serverless uptime monitoring solution designed for personal fleet management, demonstrating AWS proficiency and SRE principles through Go, Lambda, S3-backed persistence, and scheduled EventBridge triggers."
  stack: "Go, AWS Lambda, S3, EventBridge, Terraform, Tailwind CSS"
  pattern: "Serverless Event-Driven Monitor / Scheduled Fleet Polling"
  entry_point: "cmd/lambda/main.go (Backend) / cmd/web/main.go (SSG)"
  persistence_strategy: "S3-backed JSON storage for latest fleet snapshots and URL-keyed historical trendlines (Pulse)"
  observability: "Structured logging for check failures, S3 state tracking, and UI-driven Pulse trendlines for 5-hour availability windows."
  machine_registry: "/api/evolution-registry.json"

hero:
  headline: "Fleet-Wide Availability Tracking"
  sub_headline: "A serverless approach to infrastructure reliability and performance monitoring."
  brief_description: "A lightweight SRE laboratory for managing multi-site uptime with high-signal visibility and minimal operational overhead."
  cta_text: "Explore on GitHub"
  cta_link: "https://github.com/victoriacheng15/uptime-monitor"
  secondary_cta_text: "Launch Monitor"
  secondary_cta_link: "monitor.html"
  tertiary_cta_text: "See the Evolution"
  tertiary_cta_link: "evolution.html"

what_is_uptime_monitor:
  title: "Reliability as a Priority"
  content:
    - "Uptime Monitor is a serverless platform engineering lab for operating reliable health checks across a fleet of targets with clear visibility into status, latency, and history."
    - "It demonstrates practical serverless SRE work: automated scheduling, historical data persistence in S3, and clean architectural separation between monitoring and presentation."
    - "The project favors event-driven simplicity and cost-efficient cloud primitives over complex, heavy-weight monitoring solutions."

key_features:
  title: "Fleet Signals"
  features:
    - name: "Lambda Operations"
      description: "Executes lightweight, concurrent health checks via AWS Lambda, minimizing compute costs while maximizing speed."
      icon: "bolt"
    - name: "S3 Persistence"
      description: "Uses S3 as a low-cost database to store historical check results, driving trendline 'Pulse' visualization."
      icon: "database"
    - name: "Infrastructure as Code"
      description: "Provisioned and managed declaratively with Terraform, ensuring reproducible cloud environments."
      icon: "shield-check"
    - name: "Go Performance"
      description: "Built with Go for rapid startup (low cold starts) and reliable concurrent network operations."
      icon: "code"

why_it_matters:
  title: "Why It Matters"
  points:
    - "Shows ownership of serverless architecture, event-driven triggers, and S3-based data lifecycles."
    - "Demonstrates SRE judgment through multi-site fleet management and historical trend analysis."
    - "Adheres to high engineering standards with 80%+ test coverage and structured logging."
    - "Maintains transparency through a narrative Evolution Log and documented architectural decisions (ADRs)."

footer:
  author: "Victoria Cheng"
  github_link: "https://github.com/victoriacheng15"
  linkedin_link: "https://www.linkedin.com/in/victoriacheng15/"
